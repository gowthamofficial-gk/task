<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#141414;
    color:white;
}

/* Navbar */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    position:absolute;
    width:100%;
    z-index:10;
}

.logo{
    color:#e50914;
    font-size:36px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* Hero Section */
.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    padding:0 60px;
}

.hero-content{
    max-width:600px;
}

.hero h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero p{
    font-size:20px;
    margin-bottom:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    cursor:pointer;
    font-size:16px;
    border-radius:5px;
    margin-right:10px;
}

.play-btn{
    background:white;
    color:black;
}

.info-btn{
    background:rgba(109,109,110,0.7);
    color:white;
}

/* Movie Rows */
.section{
    padding:30px 50px;
}

.section h2{
    margin-bottom:15px;
}

.movie-row{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.movie-row::-webkit-scrollbar{
    display:none;
}

.movie-card{
    min-width:220px;
    transition:0.3s;
}

.movie-card:hover{
    transform:scale(1.08);
}

.movie-card img{
    width:100%;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:20px;
    color:#999;
}

@media(max-width:768px){
    .hero h1{
        font-size:40px;
    }

    .navbar{
        padding:20px;
    }

    .section{
        padding:20px;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">NETFLIX</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">TV Shows</a>
        <a href="#">Movies</a>
        <a href="#">My List</a>
    </div>
</div>

<!-- Hero Section -->
<section class="hero">
    <div class="hero-content">
        <h1>Stranger Things</h1>
        <p>
            A thrilling adventure unfolds in a small town where
            supernatural forces and secret experiments collide.
        </p>

        <button class="btn play-btn" onclick="playMovie()">
            ▶ Play
        </button>

        <button class="btn info-btn">
            More Info
        </button>
    </div>
</section>

<!-- Trending Section -->
<section class="section">
    <h2>Trending Now</h2>

    <div class="movie-row">

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" alt="">
        </div>

    </div>
</section>

<!-- Popular Section -->
<section class="section">
    <h2>Popular Movies</h2>

    <div class="movie-row">

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1499364615650-ec38552f4f34?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500" alt="">
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1524985069026-dd778a71c7b4?w=500" alt="">
        </div>

    </div>
</section>

<footer>
    © 2026 Netflix Clone UI
</footer>

<script>
function playMovie(){
    alert("Playing Movie...");
}
</script>

</body>
</html>
