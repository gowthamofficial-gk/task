<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabs Component</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Container */
.tabs-container{
    width:400px;
    background:white;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    overflow:hidden;
}

/* Tab buttons */
.tab-buttons{
    display:flex;
    background:#4f46e5;
}

.tab-buttons button{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    background:transparent;
    color:white;
    font-size:14px;
    transition:0.3s;
}

.tab-buttons button.active{
    background:#3730a3;
}

/* Tab content */
.tab-content{
    padding:20px;
    display:none;
}

.tab-content.active{
    display:block;
}
</style>
</head>

<body>

<div class="tabs-container">

    <div class="tab-buttons">
        <button class="active" onclick="openTab(0)">Home</button>
        <button onclick="openTab(1)">Profile</button>
        <button onclick="openTab(2)">Settings</button>
    </div>

    <div class="tab-content active">
        <h2>Home</h2>
        <p>Welcome to the home tab content.</p>
    </div>

    <div class="tab-content">
        <h2>Profile</h2>
        <p>This is your profile section.</p>
    </div>

    <div class="tab-content">
        <h2>Settings</h2>
        <p>Manage your settings here.</p>
    </div>

</div>

<script>
function openTab(index){
    let tabs = document.querySelectorAll(".tab-content");
    let buttons = document.querySelectorAll(".tab-buttons button");

    tabs.forEach(tab => tab.classList.remove("active"));
    buttons.forEach(btn => btn.classList.remove("active"));

    tabs[index].classList.add("active");
    buttons[index].classList.add("active");
}
</script>

</body>
</html>
