<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Popup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Button */
.open-btn{
    padding:12px 20px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

/* Overlay */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

/* Modal box */
.modal-content{
    background:white;
    padding:20px;
    width:300px;
    border-radius:10px;
    text-align:center;
    position:relative;
    animation:pop 0.3s ease;
}

/* Close button */
.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
}

/* Animation */
@keyframes pop{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<button class="open-btn" onclick="openModal()">Open Modal</button>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h2>Hello!</h2>
        <p>This is a simple modal popup.</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
function openModal(){
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

// Close when clicking outside modal
window.onclick = function(event){
    let modal = document.getElementById("modal");
    if(event.target === modal){
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
