<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#141414;
    color:white;
}

/* Header */
header{
    background:#000;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:red;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    border-radius:5px;
}

/* Banner */
.banner{
    height:400px;
    background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1200') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

.banner-content{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:10px;
}

.banner h1{
    font-size:50px;
    margin-bottom:10px;
}

/* Movies */
.movies{
    padding:30px;
}

.movies h2{
    margin-bottom:20px;
}

.movie-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.movie-card{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.movie-card:hover{
    transform:scale(1.05);
}

.movie-card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.movie-card h3{
    padding:10px;
}

.movie-card p{
    padding:0 10px 10px;
    color:#ccc;
}

.movie-card button{
    margin:10px;
    padding:10px;
    width:calc(100% - 20px);
    border:none;
    background:red;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:15px;
    background:#000;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
    <div class="logo">🎬 MovieFlix</div>

    <div class="search-box">
        <input type="text" placeholder="Search Movies...">
    </div>
</header>

<section class="banner">
    <div class="banner-content">
        <h1>Watch Latest Movies</h1>
        <p>Unlimited Entertainment Anytime</p>
    </div>
</section>

<section class="movies">
    <h2>Popular Movies</h2>

    <div class="movie-grid">

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=600" alt="Movie">
            <h3>Action Hero</h3>
            <p>⭐ 4.8/5</p>
            <button onclick="watchMovie()">Watch Now</button>
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=600" alt="Movie">
            <h3>Adventure Quest</h3>
            <p>⭐ 4.7/5</p>
            <button onclick="watchMovie()">Watch Now</button>
        </div>

        <div class="movie-card">
            <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=600" alt="Movie">
            <h3>Dark Mystery</h3>
            <p>⭐ 4.9/5</p>
            <button onclick="watchMovie()">Watch Now</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 MovieFlix. All Rights Reserved.</p>
</footer>

<script>
function watchMovie(){
    alert("Enjoy your movie! 🍿");
}
</script>

</body>
</html>
