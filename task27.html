<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Error Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e1e2f,#4f46e5);
    color:white;
}

/* Container */
.container{
    text-align:center;
}

/* Big number */
h1{
    font-size:120px;
    letter-spacing:5px;
    animation:float 2s ease-in-out infinite;
}

/* Message */
p{
    font-size:18px;
    margin:10px 0 20px;
    color:#ddd;
}

/* Button */
a{
    display:inline-block;
    padding:12px 20px;
    background:white;
    color:#4f46e5;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    background:#ddd;
}

/* Floating animation */
@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Oops! Page not found</p>
    <a href="#">Go Back Home</a>
</div>

</body>
</html>
