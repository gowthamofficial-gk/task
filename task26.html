<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Card Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

/* Container */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

/* Card */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

/* Image */
.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

/* Content */
.card-body{
    padding:15px;
}

.card-body h3{
    margin-bottom:8px;
}

.card-body p{
    font-size:14px;
    color:gray;
    line-height:1.5;
}

/* Button */
.card-body button{
    margin-top:10px;
    padding:8px 12px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.card-body button:hover{
    background:#3730a3;
}
</style>
</head>

<body>

<h2 style="text-align:center; margin-bottom:20px;">Responsive Card Layout</h2>

<div class="container">

    <div class="card">
        <img src="https://picsum.photos/400/300?1">
        <div class="card-body">
            <h3>Card Title 1</h3>
            <p>This is a simple responsive card layout using HTML and CSS.</p>
            <button>Read More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?2">
        <div class="card-body">
            <h3>Card Title 2</h3>
            <p>Cards automatically adjust based on screen size.</p>
            <button>Read More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?3">
        <div class="card-body">
            <h3>Card Title 3</h3>
            <p>Clean modern UI with hover effects.</p>
            <button>Read More</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300?4">
        <div class="card-body">
            <h3>Card Title 4</h3>
            <p>Easy to use responsive grid system.</p>
            <button>Read More</button>
        </div>
    </div>

</div>

</body>
</html>
