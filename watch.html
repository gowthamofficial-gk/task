<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch App</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    text-align:center;
    background:#2c2c3e;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    width:300px;
}

h1{
    margin-bottom:20px;
}

.time{
    font-size:40px;
    margin-bottom:20px;
    letter-spacing:2px;
}

.buttons button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.start{
    background:#22c55e;
    color:white;
}

.pause{
    background:#f59e0b;
    color:white;
}

.reset{
    background:#ef4444;
    color:white;
}

button:hover{
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>Stopwatch</h1>

    <div class="time" id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="startTimer()">Start</button>
        <button class="pause" onclick="pauseTimer()">Pause</button>
        <button class="reset" onclick="resetTimer()">Reset</button>
    </div>
</div>

<script>
let timer;
let seconds = 0;
let running = false;

function formatTime(sec){
    let hrs = Math.floor(sec / 3600);
    let mins = Math.floor((sec % 3600) / 60);
    let secs = sec % 60;

    return (
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0')
    );
}

function updateDisplay(){
    document.getElementById("display").textContent = formatTime(seconds);
}

function startTimer(){
    if(!running){
        running = true;
        timer = setInterval(() => {
            seconds++;
            updateDisplay();
        }, 1000);
    }
}

function pauseTimer(){
    running = false;
    clearInterval(timer);
}

function resetTimer(){
    running = false;
    clearInterval(timer);
    seconds = 0;
    updateDisplay();
}
</script>

</body>
</html>
