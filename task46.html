<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fafafa;
}

/* Navbar */
.navbar{
    background:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search{
    padding:8px;
    width:250px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Stories */
.stories{
    display:flex;
    gap:15px;
    overflow-x:auto;
    background:white;
    padding:15px;
    margin:20px auto;
    max-width:700px;
    border-radius:10px;
}

.story{
    text-align:center;
}

.story img{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid #ff0066;
}

/* Posts */
.feed{
    max-width:700px;
    margin:auto;
}

.post{
    background:white;
    border:1px solid #ddd;
    margin-bottom:20px;
    border-radius:10px;
    overflow:hidden;
}

.post-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
}

.post-header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.post-image{
    width:100%;
    height:450px;
    object-fit:cover;
}

.actions{
    padding:15px;
    font-size:22px;
}

.actions span{
    cursor:pointer;
    margin-right:15px;
}

.caption{
    padding:0 15px 15px;
}

@media(max-width:768px){
    .search{
        display:none;
    }
}
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2 class="logo">Instagram</h2>
    <input class="search" type="text" placeholder="Search">
    <div>❤️ 💬 👤</div>
</div>

<!-- Stories -->
<div class="stories">

    <div class="story">
        <img src="https://randomuser.me/api/portraits/men/1.jpg">
        <p>Arun</p>
    </div>

    <div class="story">
        <img src="https://randomuser.me/api/portraits/women/2.jpg">
        <p>Priya</p>
    </div>

    <div class="story">
        <img src="https://randomuser.me/api/portraits/men/3.jpg">
        <p>Vijay</p>
    </div>

    <div class="story">
        <img src="https://randomuser.me/api/portraits/women/4.jpg">
        <p>Divya</p>
    </div>

</div>

<!-- Feed -->
<div class="feed">

    <div class="post">

        <div class="post-header">
            <img src="https://randomuser.me/api/portraits/men/1.jpg">
            <strong>Arun</strong>
        </div>

        <img class="post-image"
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800">

        <div class="actions">
            <span onclick="likePost()">❤️</span>
            <span>💬</span>
            <span>📤</span>
        </div>

        <div class="caption">
            <strong>Arun</strong> Enjoying the weekend! 🌄
        </div>

    </div>

    <div class="post">

        <div class="post-header">
            <img src="https://randomuser.me/api/portraits/women/2.jpg">
            <strong>Priya</strong>
        </div>

        <img class="post-image"
        src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800">

        <div class="actions">
            <span onclick="likePost()">❤️</span>
            <span>💬</span>
            <span>📤</span>
        </div>

        <div class="caption">
            <strong>Priya</strong> Work and coffee ☕
        </div>

    </div>

</div>

<script>
function likePost(){
    alert("❤️ Post Liked!");
}
</script>

</body>
</html>
