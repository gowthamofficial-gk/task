<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f9f9f9;
}

/* Header */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:red;
}

.search-box{
    display:flex;
}

.search-box input{
    width:400px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:20px 0 0 20px;
}

.search-box button{
    padding:10px 20px;
    border:none;
    background:red;
    color:white;
    border-radius:0 20px 20px 0;
    cursor:pointer;
}

/* Layout */
.container{
    display:flex;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:white;
    height:calc(100vh - 70px);
    padding:20px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:12px;
    cursor:pointer;
    border-radius:5px;
}

.sidebar li:hover{
    background:#eee;
}

/* Videos */
.content{
    flex:1;
    padding:20px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.video-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.video-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.video-info{
    padding:15px;
}

.video-info h3{
    margin-bottom:8px;
}

.video-info p{
    color:gray;
}

@media(max-width:768px){
    .sidebar{
        display:none;
    }

    .search-box input{
        width:180px;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">▶ YouTube</div>

    <div class="search-box">
        <input type="text" placeholder="Search">
        <button>Search</button>
    </div>

    <div>👤</div>
</header>

<div class="container">

    <div class="sidebar">
        <ul>
            <li>🏠 Home</li>
            <li>🔥 Trending</li>
            <li>📺 Subscriptions</li>
            <li>🎵 Music</li>
            <li>🎮 Gaming</li>
            <li>⚙ Settings</li>
        </ul>
    </div>

    <div class="content">

        <div class="video-grid">

            <div class="video-card">
                <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=800" alt="Video">
                <div class="video-info">
                    <h3>Web Development Tutorial</h3>
                    <p>Code Channel • 120K Views</p>
                </div>
            </div>

            <div class="video-card">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800" alt="Video">
                <div class="video-info">
                    <h3>JavaScript Course</h3>
                    <p>Learn JS • 250K Views</p>
                </div>
            </div>

            <div class="video-card">
                <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800" alt="Video">
                <div class="video-info">
                    <h3>Tech Review</h3>
                    <p>Tech World • 90K Views</p>
                </div>
            </div>

            <div class="video-card">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800" alt="Video">
                <div class="video-info">
                    <h3>College Project Guide</h3>
                    <p>Student Hub • 75K Views</p>
                </div>
            </div>

        </div>

    </div>

</div>

<script>
document.querySelector("button").addEventListener("click", function(){
    alert("Search feature can be connected to API later.");
});
</script>

</body>
</html>
