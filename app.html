<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List App</title>

<style>
body{
    font-family:Arial;
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

.input-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px;
    border:none;
    background:#4f46e5;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}

ul{
    list-style:none;
    margin-top:15px;
    padding:0;
}

li{
    background:#f4f4f4;
    padding:10px;
    margin-bottom:8px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

li.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.delete{
    background:red;
    padding:5px 8px;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>To-Do List</h2>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function addTask(){
    let input = document.getElementById("taskInput");
    let taskText = input.value.trim();

    if(taskText === ""){
        alert("Please enter a task!");
        return;
    }

    let li = document.createElement("li");

    li.innerHTML = `
        <span onclick="toggleTask(this)">${taskText}</span>
        <button class="delete" onclick="deleteTask(this)">X</button>
    `;

    document.getElementById("taskList").appendChild(li);

    input.value = "";
}

function deleteTask(btn){
    btn.parentElement.remove();
}

function toggleTask(task){
    task.parentElement.classList.toggle("completed");
}
</script>

</body>
</html>
