<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    color:white;
}

/* Title */
h1{
    text-align:center;
    padding:20px;
}

/* Gallery Grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:15px;
    padding:20px;
}

/* Images */
.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */
.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox img{
    width:80%;
    max-width:600px;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/300/200?1" onclick="openImage(this.src)">
    <img src="https://picsum.photos/300/200?2" onclick="openImage(this.src)">
    <img src="https://picsum.photos/300/200?3" onclick="openImage(this.src)">
    <img src="https://picsum.photos/300/200?4" onclick="openImage(this.src)">
    <img src="https://picsum.photos/300/200?5" onclick="openImage(this.src)">
    <img src="https://picsum.photos/300/200?6" onclick="openImage(this.src)">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeImage()">×</span>
    <img id="lightbox-img">
</div>

<script>
function openImage(src){
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeImage(){
    document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
