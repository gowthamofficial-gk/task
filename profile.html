<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #74ebd5, #9face6);
}

/* Card */
.card{
    width:300px;
    background:white;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    overflow:hidden;
}

/* Top background */
.card-header{
    height:100px;
    background:#4f46e5;
}

/* Profile image */
.profile-img{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid white;
    margin-top:-50px;
}

/* Content */
.card-body{
    padding:20px;
}

.card-body h2{
    margin:10px 0 5px;
}

.card-body p{
    color:gray;
    font-size:14px;
}

/* Buttons */
.btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.follow{
    background:#4f46e5;
    color:white;
}

.follow:hover{
    background:#3730a3;
}

.message{
    background:#e5e7eb;
    margin-left:10px;
}

.message:hover{
    background:#d1d5db;
}

/* Social icons */
.social{
    margin-top:15px;
}

.social a{
    margin:0 8px;
    text-decoration:none;
    font-size:18px;
    color:#4f46e5;
}
</style>

</head>
<body>

<div class="card">

    <div class="card-header"></div>

    <img class="profile-img" src="https://i.pravatar.cc/150?img=12" alt="profile">

    <div class="card-body">
        <h2>John Doe</h2>
        <p>UI/UX Designer</p>

        <button class="btn follow">Follow</button>
        <button class="btn message">Message</button>

        <div class="social">
            <a href="#">🔵</a>
            <a href="#">🟣</a>
            <a href="#">⚫</a>
        </div>
    </div>

</div>

</body>
</html>
