<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Application</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-container{
    width:500px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
}

.option{
    background:#f8f8f8;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    cursor:pointer;
}

.option:hover{
    background:#e9ecef;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    text-align:center;
    font-size:22px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Question</h2>

    <div class="option" onclick="selectOption(0)" id="opt0"></div>
    <div class="option" onclick="selectOption(1)" id="opt1"></div>
    <div class="option" onclick="selectOption(2)" id="opt2"></div>
    <div class="option" onclick="selectOption(3)" id="opt3"></div>

    <button onclick="nextQuestion()">Next Question</button>

    <div id="result"></div>
</div>

<script>
const quizData = [
{
    question:"Which language is used for web styling?",
    options:["HTML","CSS","Python","Java"],
    answer:1
},
{
    question:"Which tag is used for JavaScript?",
    options:["<js>","<script>","<javascript>","<code>"],
    answer:1
},
{
    question:"What does SQL stand for?",
    options:[
        "Structured Query Language",
        "Simple Query Language",
        "System Query Language",
        "Server Query Language"
    ],
    answer:0
}
];

let currentQuestion = 0;
let score = 0;
let selectedAnswer = -1;

function loadQuestion(){
    document.getElementById("question").innerText =
    quizData[currentQuestion].question;

    for(let i=0;i<4;i++){
        document.getElementById("opt"+i).innerText =
        quizData[currentQuestion].options[i];
    }
}

function selectOption(index){
    selectedAnswer = index;

    document.querySelectorAll(".option")
    .forEach(opt => opt.style.background="#f8f8f8");

    document.getElementById("opt"+index)
    .style.background="#cce5ff";
}

function nextQuestion(){

    if(selectedAnswer === quizData[currentQuestion].answer){
        score++;
    }

    selectedAnswer = -1;
    currentQuestion++;

    if(currentQuestion < quizData.length){
        loadQuestion();
    }else{
        document.querySelector(".quiz-container").innerHTML =
        `<h2>Quiz Completed 🎉</h2>
         <p id="result">Your Score: ${score}/${quizData.length}</p>`;
    }
}

loadQuestion();
</script>

</body>
</html>
