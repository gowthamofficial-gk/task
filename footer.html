<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Footer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Page content placeholder */
.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
}

/* Footer */
footer{
    background:#111;
    color:white;
    padding:40px 20px;
}

.footer-container{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.footer-box{
    width:250px;
}

.footer-box h3{
    margin-bottom:10px;
    color:#00bcd4;
}

.footer-box p,
.footer-box a{
    color:#ccc;
    font-size:14px;
    text-decoration:none;
    line-height:1.6;
}

.footer-box a:hover{
    color:white;
}

/* Bottom */
.bottom{
    text-align:center;
    margin-top:20px;
    border-top:1px solid #333;
    padding-top:15px;
    font-size:14px;
    color:#aaa;
}

/* Responsive */
@media(max-width:768px){
    .footer-container{
        flex-direction:column;
        text-align:center;
        align-items:center;
    }

    .footer-box{
        width:100%;
    }
}
</style>

</head>

<body>

<div class="content">
    <h1>Page Content Here</h1>
</div>

<footer>

    <div class="footer-container">

        <div class="footer-box">
            <h3>About Us</h3>
            <p>We build modern and responsive web designs for beginners and professionals.</p>
        </div>

        <div class="footer-box">
            <h3>Quick Links</h3>
            <a href="#">Home</a><br>
            <a href="#">Services</a><br>
            <a href="#">Portfolio</a><br>
            <a href="#">Contact</a>
        </div>

        <div class="footer-box">
            <h3>Contact</h3>
            <p>Email: support@example.com</p>
            <p>Phone: +91 9876543210</p>
        </div>

    </div>

    <div class="bottom">
        © 2026 MyWebsite | All Rights Reserved
    </div>

</footer>

</body>
</html>
