<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Light Mode Toggle</title>

<style>
/* Default Light Mode */
body{
    margin:0;
    font-family:Arial;
    transition:0.3s;
    background:#f4f4f4;
    color:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Dark Mode */
.dark-mode{
    background:#121212;
    color:#fff;
}

.container{
    text-align:center;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    background:#4f46e5;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#3730a3;
}

.card{
    margin-top:20px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

/* Dark mode card fix */
.dark-mode .card{
    background:#1e1e1e;
    color:white;
}
</style>
</head>

<body>

<div class="container">
    <h1>Dark / Light Mode</h1>

    <button onclick="toggleMode()">Toggle Theme</button>

    <div class="card">
        <p>This is a simple theme switcher using JavaScript.</p>
    </div>
</div>

<script>
function toggleMode(){
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
